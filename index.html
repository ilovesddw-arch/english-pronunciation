<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>발음 평가</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      overflow: hidden;
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    
    .app {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      max-height: 100vh;
      background: white;
      border-radius: 20px;
      overflow: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    
    .screen {
      display: none;
    }
    
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    
    .screen-select {
      gap: 15px;
    }
    
    .title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }
    
    .subtitle {
      font-size: 13px;
      color: #666;
    }
    
    .word-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
    }
    
    .word-item {
      padding: 12px;
      border: 2px solid #e5e7eb;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }
    
    .word-item:active {
      background: #f0f4ff;
      border-color: #4f46e5;
      transform: scale(0.95);
    }
    
    .word-item.selected {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }
    
    .screen-record {
      gap: 20px;
    }
    
    .info-box {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 12px;
      border-left: 4px solid #4f46e5;
    }
    
    .info-word {
      font-size: 18px;
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 8px;
    }
    
    .info-text {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }
    
    .recording-timer {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #ef4444;
      display: none;
      margin: 20px 0;
    }
    
    .recording-timer.active {
      display: block;
    }
    
    .button-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }
    
    .btn {
      padding: 16px 20px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 50px;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    .btn-primary {
      background: #ef4444;
      color: white;
    }
    
    .btn-primary:active {
      background: #dc2626;
    }
    
    .btn-stop {
      background: #6b7280;
      color: white;
    }
    
    .btn-stop:active {
      background: #4b5563;
    }
    
    .btn-submit {
      background: #4f46e5;
      color: white;
    }
    
    .btn-submit:active {
      background: #4338ca;
    }
    
    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.6;
    }
    
    .btn-secondary {
      background: transparent;
      color: #666;
      border: none;
      font-size: 14px;
      padding: 10px;
    }
    
    .success-msg {
      text-align: center;
      color: #16a34a;
      font-size: 13px;
      font-weight: 600;
      margin: 10px 0;
      display: none;
    }
    
    .success-msg.show {
      display: block;
    }
    
    .screen-feedback {
      gap: 15px;
    }
    
    .feedback-word {
      color: #4f46e5;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
    }
    
    .feedback-box {
      background: linear-gradient(135deg, #f0f4ff 0%, #f3e8ff 100%);
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #4f46e5;
      font-size: 13px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
      overflow-y: auto;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #999;
      padding: 10px;
      flex-shrink: 0;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🎤 발음 평가</h1>
      <p>영어를 읽고 피드백을 받으세요!</p>
    </div>
    
    <div class="body">
      <div id="screen-1" class="screen active screen-select">
        <div class="title">단어 선택</div>
        <div class="subtitle">읽을 단어를 선택하세요</div>
        <div class="word-list" id="wordList"></div>
      </div>
      
      <div id="screen-2" class="screen screen-record">
        <div class="title">녹음</div>
        <div class="info-box">
          <div class="info-word" id="recordWord"></div>
          <div class="info-text" id="recordDef"></div>
        </div>
        <div class="recording-timer" id="timer">0초</div>
        <div class="button-area">
          <button id="recordBtn" class="btn btn-primary">🎤 녹음 시작</button>
          <div class="success-msg" id="successMsg">✓ 녹음 완료!</div>
          <button id="submitBtn" class="btn btn-submit" disabled>피드백 받기</button>
          <button id="backBtn" class="btn btn-secondary">← 이전</button>
        </div>
      </div>
      
      <div id="screen-3" class="screen screen-feedback">
        <div class="title">✨ 피드백</div>
        <div class="feedback-word" id="feedbackWord"></div>
        <div class="feedback-box" id="feedbackContent"></div>
        <button id="retryBtn" class="btn btn-submit">🔄 다시 하기</button>
      </div>
    </div>
    
    <div class="footer">📚 선생님이 만든 발음 평가 시스템</div>
  </div>

  <script>
    const vocab = [
      { word: 'Carbon credits', def: 'A ticket that lets you send out a set amount of gas.' },
      { word: 'invisible', def: 'Something that you cannot see with your eyes.' },
      { word: 'greenhouse gas', def: 'Bad gases in the air that make our Earth warmer.' },
      { word: 'carbon dioxide', def: 'A gas that we breathe out and cars make.' },
      { word: 'atmosphere', def: 'The thick air that goes all around the Earth.' },
      { word: 'release', def: 'To let something go free or send it out.' },
      { word: 'permit', def: 'A paper that says you are allowed to do something.' },
      { word: 'emit', def: 'To send out light, heat, gas, or sound.' },
      { word: 'certain', def: 'One specific thing, or being very sure about something.' },
      { word: 'additional', def: 'Extra or more of something than before.' },
      { word: 'generate', def: 'To make or produce something, like power.' },
      { word: 'significant', def: 'Important, big, or very easy to notice.' },
      { word: 'revenue', def: 'The money that a business or company makes.' },
      { word: 'improve', def: 'To make something better than it was.' },
      { word: 'efficiency', def: 'Doing something well without wasting time.' },
      { word: 'invest', def: 'To spend money to make more money in the future.' },
      { word: 'sustainable', def: 'Able to continue for a long time.' }
    ];

    let currentWord = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingTime = 0;
    let timerInterval = null;

    function showScreen(n) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + n).classList.add('active');
    }

    function initWords() {
      const list = document.getElementById('wordList');
      vocab.forEach((item, i) => {
        const btn = document.createElement('div');
        btn.className = 'word-item';
        btn.textContent = item.word;
        btn.ontouchstart = () => {
          btn.style.background = '#f0f4ff';
          btn.style.borderColor = '#4f46e5';
        };
        btn.ontouchend = () => {
          btn.style.background = '';
          btn.style.borderColor = '';
        };
        btn.onclick = () => selectWord(item);
        list.appendChild(btn);
      });
    }

    function selectWord(item) {
      currentWord = item;
      document.getElementById('recordWord').textContent = item.word;
      document.getElementById('recordDef').textContent = item.def;
      resetRecord();
      showScreen(2);
    }

    document.getElementById('recordBtn').ontouchstart = function() {
      if (!mediaRecorder) startRecord.call(this);
    };

    document.getElementById('recordBtn').onclick = function() {
      if (!mediaRecorder) startRecord.call(this);
    };

    async function startRecord() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        recordingTime = 0;
        
        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start();
        
        document.getElementById('recordBtn').textContent = '⏹️ 녹음 중지';
        document.getElementById('recordBtn').className = 'btn btn-stop';
        document.getElementById('recordBtn').onclick = stopRecord;
        document.getElementById('recordBtn').ontouchstart = stopRecord;
        
        document.getElementById('timer').classList.add('active');
        timerInterval = setInterval(() => {
          recordingTime++;
          document.getElementById('timer').textContent = recordingTime + '초';
        }, 1000);
        
      } catch (e) {
        alert('마이크 권한을 허용해주세요!');
      }
    }

    function stopRecord() {
      if (!mediaRecorder) return;
      mediaRecorder.stop();
      mediaRecorder = null;
      clearInterval(timerInterval);
      
      document.getElementById('recordBtn').textContent = '🎤 녹음 시작';
      document.getElementById('recordBtn').className = 'btn btn-primary';
      document.getElementById('recordBtn').onclick = function() {
        if (!mediaRecorder) startRecord.call(this);
      };
      
      document.getElementById('successMsg').classList.add('show');
      document.getElementById('submitBtn').disabled = false;
    }

    document.getElementById('submitBtn').onclick = function() {
      if (audioChunks.length === 0) return;
      
      const feedback = `📍 발음 평가: Good

✅ 잘한 부분: 단어의 강세 위치를 잘 맞혔어요!

❌ 개선할 부분: 마지막 음절을 좀 더 또렷하게

🎯 점수: 82/100

💡 팁: 천천히 다시 읽어보세요!`;
      
      document.getElementById('feedbackWord').textContent = currentWord.word;
      document.getElementById('feedbackContent').textContent = feedback;
      showScreen(3);
    };

    document.getElementById('backBtn').onclick = () => {
      resetRecord();
      showScreen(1);
    };

    document.getElementById('retryBtn').onclick = () => {
      resetRecord();
      showScreen(1);
    };

    function resetRecord() {
      audioChunks = [];
      recordingTime = 0;
      clearInterval(timerInterval);
      if (mediaRecorder) {
        mediaRecorder.stop();
        mediaRecorder = null;
      }
      document.getElementById('timer').classList.remove('active');
      document.getElementById('successMsg').classList.remove('show');
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('recordBtn').textContent = '🎤 녹음 시작';
      document.getElementById('recordBtn').className = 'btn btn-primary';
      document.getElementById('recordBtn').onclick = function() {
        if (!mediaRecorder) startRecord.call(this);
      };
    }

    initWords();
  </script>
</body>
</html>
